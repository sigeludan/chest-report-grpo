# IU-Xray chest report GRPO (组 B: R_format + R_clinical)
# Launch: bash scripts/run_grpo_iu_xray.sh
# Requires: EasyR1 installed, flash-attn OK, CheXbert at models/chexbert/chexbert.pth

data:
  train_files: /root/autodl-tmp/chest-report-grpo/data/grpo/train.jsonl
  val_files: /root/autodl-tmp/chest-report-grpo/data/grpo/val.jsonl
  prompt_key: problem
  answer_key: answer
  image_key: images
  video_key: videos
  # Relative image paths in jsonl are resolved against project root.
  image_dir: /root/autodl-tmp/chest-report-grpo
  video_fps: 2.0
  max_prompt_length: 12288
  max_response_length: 512
  mini_rollout_batch_size: 8
  rollout_batch_size: 16
  val_batch_size: 32
  format_prompt: null
  override_chat_template: null
  shuffle: true
  seed: 42
  min_pixels: 262144
  max_pixels: 4194304
  filter_overlong_prompts: true
  filter_overlong_prompts_workers: 8

algorithm:
  adv_estimator: grpo
  disable_kl: false
  use_kl_loss: true
  kl_penalty: low_var_kl
  kl_coef: 0.02
  online_filtering: false
  filter_key: overall
  filter_low: 0.01
  filter_high: 0.99

worker:
  actor:
    global_batch_size: 8
    micro_batch_size_per_device_for_update: 1
    micro_batch_size_per_device_for_experience: 2
    max_grad_norm: 1.0
    padding_free: true
    dynamic_batching: true
    ulysses_size: 1
    model:
      model_path: /root/autodl-tmp/chest-report-grpo/models/Qwen2.5-VL-7B-Instruct-sft-merged
      enable_gradient_checkpointing: true
      trust_remote_code: true
      freeze_vision_tower: true
      lora:
        rank: 8
        alpha: 16
        target_modules: all-linear
        exclude_modules: .*visual.*
    optim:
      lr: 5.0e-7
      weight_decay: 1.0e-2
      strategy: adamw
      lr_warmup_ratio: 0.05
    fsdp:
      enable_full_shard: true
      enable_cpu_offload: false
      enable_rank0_init: true
    offload:
      offload_params: true
      offload_optimizer: true

  rollout:
    n: 4
    temperature: 1.0
    top_p: 1.0
    limit_images: 0
    gpu_memory_utilization: 0.45
    enforce_eager: true
    enable_chunked_prefill: false
    tensor_parallel_size: 1
    max_model_len: 16384
    max_num_batched_tokens: 16384
    disable_tqdm: false
    val_override_config:
      temperature: 0.6
      top_p: 0.95
      n: 1

  ref:
    fsdp:
      enable_full_shard: true
      enable_cpu_offload: true
      enable_rank0_init: true
    offload:
      offload_params: false

  reward:
    reward_function: /root/autodl-tmp/chest-report-grpo/rewards/easyr1_entry.py:compute_score
    reward_function_kwargs:
      lambda_clinical: 1.0
      lambda_consistency: 0.3
      r_normal: 1.0
      gamma_fp: 0.25
      gamma_fp_severe: 0.4
      fbeta: 2.0
      lambda_abnormal: 1.5
    num_cpus: 2

trainer:
  total_epochs: 1
  max_steps: null
  project_name: chest_report_grpo
  experiment_name: iu_xray_group_b
  logger: ["file"]
  nnodes: 1
  n_gpus_per_node: 1
  max_try_make_batch: 20
  val_freq: 50
  val_before_train: true
  val_only: false
  val_generations_to_log: 3
  save_freq: 50
  save_limit: 3
  save_model_only: true
  save_checkpoint_path: /root/autodl-tmp/chest-report-grpo/checkpoints/grpo/iu_xray_group_b
  load_checkpoint_path: null
  find_last_checkpoint: true
